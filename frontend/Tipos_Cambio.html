<script>
(function () {
  var api = window.ReciclaAPI;
  var valorInput = document.getElementById('valor-input');
  var saveBtn = document.getElementById('save-btn');
  var errorBox = document.getElementById('form-error');
  var successBox = document.getElementById('form-success');
  var tableBody = document.getElementById('table-body');

  function showError(msg) { errorBox.textContent = msg; errorBox.classList.remove('hidden'); successBox.classList.add('hidden'); }
  function clearMsgs() { errorBox.classList.add('hidden'); successBox.classList.add('hidden'); }

  function cargarHistorial() {
    api.apiFetch('/tipos-cambio').then(function (rows) {
      if (rows.length === 0) {
        tableBody.innerHTML = '<tr><td class="px-4 py-3.5 text-slate-500 dark:text-slate-400" colspan="3">Todavía no se cargó ningún tipo de cambio.</td></tr>';
        return;
      }
      tableBody.innerHTML = rows.map(function (r) {
        return '<tr>' +
          '<td class="px-4 py-3.5 text-slate-700 dark:text-slate-300 text-sm">' + api.fmtDateTime(r.creado_en) + '</td>' +
          '<td class="px-4 py-3.5 text-slate-800 dark:text-slate-200 text-sm font-medium text-right">' + api.moneyGs(r.valor) + '</td>' +
          '<td class="px-4 py-3.5 text-slate-700 dark:text-slate-300 text-sm">' + api.escapeHtml(r.usuario || '—') + '</td>' +
          '</tr>';
      }).join('');
    }).catch(function (err) {
      showError(err.message || 'No se pudo cargar el historial.');
      tableBody.innerHTML = '';
    });
  }

  saveBtn.addEventListener('click', function () {
    clearMsgs();
    var valor = parseFloat(valorInput.value);
    if (!valor || valor <= 0) return showError('Ingresá un valor mayor a cero.');

    saveBtn.disabled = true;
    api.apiFetch('/tipos-cambio', {
      method: 'POST',
      body: JSON.stringify({ valor: valor }),
    }).then(function () {
      successBox.textContent = 'Tipo de cambio guardado correctamente.';
      successBox.classList.remove('hidden');
      valorInput.value = '';
      cargarHistorial();
    }).catch(function (err) {
      showError(err.message || 'No se pudo guardar el tipo de cambio.');
    }).finally(function () {
      saveBtn.disabled = false;
    });
  });

  cargarHistorial();
})();
</script>
