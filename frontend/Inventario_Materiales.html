<script>
(function () {
  var api = window.ReciclaAPI;
  var tbody = document.getElementById('materiales-tbody');
  var searchInput = document.getElementById('search-input');
  var paginationLabel = document.getElementById('pagination-label');
  var errorBox = document.getElementById('page-error');
  var materiales = [];

  function showError(msg) { errorBox.textContent = msg; errorBox.classList.remove('hidden'); }

  function render() {
    var q = searchInput.value.trim().toLowerCase();
    var filtered = materiales.filter(function (m) { return m.nombre.toLowerCase().includes(q); });

    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td class="px-6 py-4 text-slate-500 dark:text-slate-400" colspan="5">No se encontraron materiales.</td></tr>';
    } else {
      tbody.innerHTML = filtered.map(function (m) {
        var stockCls = Number(m.stock_actual) <= Number(m.stock_minimo) ? 'text-red-500 font-semibold' : '';
        return '<tr class="border-b border-primary/20 dark:border-primary/10 hover:bg-primary/5 dark:hover:bg-primary/5">' +
          '<td class="px-6 py-4 font-medium text-slate-900 dark:text-white whitespace-nowrap">' + api.escapeHtml(m.nombre) + '</td>' +
          '<td class="px-6 py-4 ' + stockCls + '">' + Number(m.stock_actual).toLocaleString('es-AR', { maximumFractionDigits: 2 }) + '</td>' +
          '<td class="px-6 py-4">' + api.escapeHtml(m.unidad_medida) + '</td>' +
          '<td class="px-6 py-4">' + api.money(m.precio_venta) + ' / ' + api.escapeHtml(m.unidad_medida) + '</td>' +
          '<td class="px-6 py-4"><div class="flex items-center justify-center gap-2">' +
          '<a href="Ficha_Producto.html?id=' + m.id + '"><button class="p-2 rounded-full hover:bg-primary/20 dark:hover:bg-primary/20 text-slate-600 dark:text-slate-300"><span class="material-symbols-outlined text-lg">edit</span></button></a>' +
          '<button class="p-2 rounded-full hover:bg-red-500/20 text-red-500" data-delete="' + m.id + '"><span class="material-symbols-outlined text-lg">delete</span></button>' +
          '</div></td></tr>';
      }).join('');
      tbody.querySelectorAll('[data-delete]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var id = btn.getAttribute('data-delete');
          var mat = materiales.find(function (m) { return String(m.id) === id; });
          if (!confirm('¿Desactivar "' + (mat ? mat.nombre : 'este material') + '"?')) return;
          api.apiFetch('/materiales/' + id, { method: 'DELETE' }).then(function () {
            load();
          }).catch(function (err) {
            showError(err.message || 'No se pudo eliminar el material.');
          });
        });
      });
    }
    paginationLabel.textContent = 'Mostrando ' + filtered.length + ' de ' + materiales.length + ' items';
  }

  function load() {
    api.apiFetch('/materiales').then(function (data) {
      materiales = data;
      render();
    }).catch(function (err) {
      showError(err.message || 'No se pudieron cargar los materiales.');
      tbody.innerHTML = '';
    });
  }

  searchInput.addEventListener('input', render);
  load();
})();
</script>
