<script>
(function () {
  var api = window.ReciclaAPI;
  var tbody = document.getElementById('usuarios-tbody');
  var searchInput = document.getElementById('search-input');
  var paginationLabel = document.getElementById('pagination-label');
  var errorBox = document.getElementById('page-error');
  var usuarios = [];

  var PERMISO_INFO = {
    full: { cls: 'bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-200 ring-blue-700/10 dark:ring-blue-600/30', label: 'Admin Total' },
    edit: { cls: 'bg-purple-100 dark:bg-purple-900 text-purple-700 dark:text-purple-200 ring-purple-700/10 dark:ring-purple-600/30', label: 'Edición' },
    view: { cls: 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 ring-gray-500/10 dark:ring-gray-600/20', label: 'Solo Lectura' },
  };

  function showError(msg) { errorBox.textContent = msg; errorBox.classList.remove('hidden'); }

  function render() {
    var q = searchInput.value.trim().toLowerCase();
    var filtered = usuarios.filter(function (u) {
      return u.nombre_usuario.toLowerCase().includes(q) || u.email.toLowerCase().includes(q);
    });

    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td class="p-4 text-text-light-secondary dark:text-text-dark-secondary" colspan="5">No se encontraron usuarios.</td></tr>';
    } else {
      tbody.innerHTML = filtered.map(function (u) {
        var permiso = PERMISO_INFO[u.permiso] || PERMISO_INFO.view;
        return '<tr class="border-b border-border-light dark:border-border-dark last:border-b-0">' +
          '<td class="p-4 font-medium">' + api.escapeHtml(u.nombre_usuario) + '</td>' +
          '<td class="p-4 text-text-light-secondary dark:text-text-dark-secondary">' + api.escapeHtml(u.email) + '</td>' +
          '<td class="p-4"><span class="inline-flex items-center rounded-md bg-green-100 dark:bg-green-900 px-2 py-1 text-xs font-medium text-green-700 dark:text-green-200 ring-1 ring-inset ring-green-600/20 dark:ring-green-700/30">' + api.escapeHtml(u.rol || '—') + '</span></td>' +
          '<td class="p-4"><span class="inline-flex items-center rounded-md ' + permiso.cls + ' px-2 py-1 text-xs font-medium ring-1 ring-inset">' + permiso.label + '</span></td>' +
          '<td class="p-4 text-right"><div class="inline-flex items-center gap-2">' +
          '<a href="Creacion_usuario.html?id=' + u.id + '"><button class="p-2 rounded-md hover:bg-primary/20"><span class="material-symbols-outlined text-xl">edit</span></button></a>' +
          '<button class="p-2 rounded-md hover:bg-red-500/20 text-red-500" data-delete="' + u.id + '"><span class="material-symbols-outlined text-xl">delete</span></button>' +
          '</div></td></tr>';
      }).join('');
      tbody.querySelectorAll('[data-delete]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var uid = btn.getAttribute('data-delete');
          var u = usuarios.find(function (x) { return String(x.id) === uid; });
          if (!confirm('¿Desactivar a "' + (u ? u.nombre_usuario : 'este usuario') + '"?')) return;
          api.apiFetch('/usuarios/' + uid, { method: 'DELETE' }).then(function () {
            load();
          }).catch(function (err) {
            showError(err.message || 'No se pudo desactivar el usuario.');
          });
        });
      });
    }
    paginationLabel.textContent = 'Mostrando ' + filtered.length + ' de ' + usuarios.length + ' usuarios';
  }

  function load() {
    api.apiFetch('/usuarios').then(function (data) {
      usuarios = data;
      render();
    }).catch(function (err) {
      if (err.status === 403) {
        showError('Tu cuenta no tiene permiso para ver la lista de usuarios (requiere permiso "full").');
      } else {
        showError(err.message || 'No se pudieron cargar los usuarios.');
      }
      tbody.innerHTML = '';
    });
  }

  searchInput.addEventListener('input', render);
  load();
})();
</script>
