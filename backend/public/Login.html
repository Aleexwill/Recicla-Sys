<script>
(function () {
  // Ya hay una sesión activa: no tiene sentido mostrar el login de nuevo.
  if (window.ReciclaAPI.getToken()) {
    window.location.href = 'Reciclaje_tablero_principal.html';
    return;
  }

  var form = document.getElementById('login-form');
  var errorBox = document.getElementById('login-error');
  var submitBtn = document.getElementById('login-submit');
  var toggleBtn = document.getElementById('toggle-password');
  var passwordInput = document.getElementById('password-input');

  toggleBtn.addEventListener('click', function () {
    var showing = passwordInput.type === 'text';
    passwordInput.type = showing ? 'password' : 'text';
    toggleBtn.querySelector('.material-symbols-outlined').textContent = showing ? 'visibility' : 'visibility_off';
  });

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    errorBox.classList.add('hidden');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Ingresando…';

    var email = document.getElementById('email-input').value.trim();
    var password = passwordInput.value;

    window.ReciclaAPI.apiFetch('/auth/login', {
      method: 'POST',
      body: JSON.stringify({ email: email, password: password }),
    }).then(function (data) {
      window.ReciclaAPI.setSession(data.token, data.usuario);
      window.location.href = 'Reciclaje_tablero_principal.html';
    }).catch(function (err) {
      errorBox.textContent = err.message || 'No se pudo iniciar sesión.';
      errorBox.classList.remove('hidden');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Iniciar Sesión';
    });
  });
})();
</script>
