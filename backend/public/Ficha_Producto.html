<script>
(function () {
  var api = window.ReciclaAPI;
  var id = new URLSearchParams(window.location.search).get('id');
  var tipoCambio = null;

  var nombreInput = document.getElementById('nombre-input');
  var descripcionInput = document.getElementById('descripcion-input');
  var monedaSelect = document.getElementById('moneda-select');
  var sinTipoCambioMsg = document.getElementById('sin-tipo-cambio-msg');
  var purchaseInput = document.getElementById('purchase-price');
  var saleInput = document.getElementById('sale-price');
  var purchasePrefix = document.getElementById('purchase-price-prefix');
  var salePrefix = document.getElementById('sale-price-prefix');
  var stockMinimoInput = document.getElementById('stock-minimo');
  var unitInput = document.getElementById('unit');
  var margenLabel = document.getElementById('margen-label');
  var stockLabel = document.getElementById('stock-label');
  var stockBadge = document.getElementById('stock-badge');
  var errorBox = document.getElementById('page-error');
  var saveBtn = document.getElementById('save-btn');
  var saveBtnLabel = document.getElementById('save-btn-label');

  function showError(msg) { errorBox.textContent = msg; errorBox.classList.remove('hidden'); }

  function updateMargen() {
    var compra = parseFloat(purchaseInput.value);
    var venta = parseFloat(saleInput.value);
    if (!compra || !venta) { margenLabel.textContent = '—'; return; }
    var margen = ((venta - compra) / compra) * 100;
    margenLabel.textContent = margen.toFixed(2) + '%';
  }
  purchaseInput.addEventListener('input', updateMargen);
  saleInput.addEventListener('input', updateMargen);

  api.apiFetch('/tipos-cambio/actual').then(function (data) {
    tipoCambio = Number(data.valor);
  }).catch(function () {
    tipoCambio = null;
    sinTipoCambioMsg.classList.remove('hidden');
  });

  function formatPrecio(v) {
    if (!v && v !== 0) return '';
    return monedaSelect.value === 'PYG' ? String(Math.round(v)) : Number(v).toFixed(2);
  }

  monedaSelect.addEventListener('change', function () {
    if (monedaSelect.value === 'PYG' && !tipoCambio) {
      showError('No hay un tipo de cambio cargado. Cargá uno en la pantalla de Tipo de Cambio antes de usar Guaraníes.');
      monedaSelect.value = 'USD';
      return;
    }
    var wasUsd = purchasePrefix.textContent === '$';
    var nowGs = monedaSelect.value === 'PYG';
    var compra = parseFloat(purchaseInput.value);
    var venta = parseFloat(saleInput.value);
    if (wasUsd && nowGs) {
      if (compra) purchaseInput.value = formatPrecio(api.usdToGs(compra, tipoCambio));
      if (venta) saleInput.value = formatPrecio(api.usdToGs(venta, tipoCambio));
    } else if (!wasUsd && !nowGs) {
      if (compra) purchaseInput.value = api.gsToUsd(compra, tipoCambio).toFixed(2);
      if (venta) saleInput.value = api.gsToUsd(venta, tipoCambio).toFixed(2);
    }
    var prefix = nowGs ? 'Gs.' : '$';
    purchasePrefix.textContent = prefix;
    salePrefix.textContent = prefix;
    purchaseInput.step = nowGs ? '1' : '0.01';
    saleInput.step = nowGs ? '1' : '0.01';
  });

  function precioUsdActual(input) {
    var v = parseFloat(input.value) || 0;
    return monedaSelect.value === 'PYG' ? api.gsToUsd(v, tipoCambio) : v;
  }

  if (id) {
    // Modo edición
    unitInput.readOnly = true;
    document.title = 'Ficha de Material';
    api.apiFetch('/materiales/' + id).then(function (m) {
      document.getElementById('breadcrumb-current').textContent = m.nombre;
      document.title = 'Ficha de Material - ' + m.nombre;
      nombreInput.value = m.nombre;
      descripcionInput.value = m.descripcion || '';
      unitInput.value = m.unidad_medida;
      var esGs = m.moneda === 'PYG';
      monedaSelect.value = esGs ? 'PYG' : 'USD';
      var prefix = esGs ? 'Gs.' : '$';
      purchasePrefix.textContent = prefix;
      salePrefix.textContent = prefix;
      purchaseInput.step = esGs ? '1' : '0.01';
      saleInput.step = esGs ? '1' : '0.01';
      purchaseInput.value = esGs && m.precio_compra_original != null ? Math.round(m.precio_compra_original) : m.precio_compra;
      saleInput.value = esGs && m.precio_venta_original != null ? Math.round(m.precio_venta_original) : m.precio_venta;
      stockMinimoInput.value = m.stock_minimo;
      stockLabel.textContent = 'Stock: ' + api.kg(m.stock_actual);
      stockBadge.classList.remove('hidden');
      stockBadge.classList.add('flex');
      stockBadge.querySelector('p').textContent = Number(m.stock_actual) <= Number(m.stock_minimo) ? 'Stock Bajo' : 'En Stock';
      updateMargen();
    }).catch(function (err) {
      showError(err.message || 'No se pudo cargar el material.');
    });

    saveBtn.addEventListener('click', function () {
      if (!nombreInput.value.trim()) return showError('El nombre es requerido.');
      if (monedaSelect.value === 'PYG' && !tipoCambio) return showError('No hay un tipo de cambio cargado para convertir Guaraníes.');
      saveBtn.disabled = true;
      saveBtnLabel.textContent = 'Guardando…';
      api.apiFetch('/materiales/' + id, {
        method: 'PUT',
        body: JSON.stringify({
          nombre: nombreInput.value.trim(),
          descripcion: descripcionInput.value.trim(),
          precio_compra: precioUsdActual(purchaseInput),
          precio_venta: precioUsdActual(saleInput),
          stock_minimo: parseFloat(stockMinimoInput.value) || 0,
          moneda: monedaSelect.value,
          tipo_cambio: monedaSelect.value === 'PYG' ? tipoCambio : null,
          precio_compra_original: parseFloat(purchaseInput.value) || 0,
          precio_venta_original: parseFloat(saleInput.value) || 0,
        }),
      }).then(function () {
        window.location.href = 'Inventario_Materiales.html';
      }).catch(function (err) {
        showError(err.message || 'No se pudo guardar el material.');
        saveBtn.disabled = false;
        saveBtnLabel.textContent = 'Guardar Cambios';
      });
    });
  } else {
    // Modo creación
    document.getElementById('breadcrumb-current').textContent = 'Nuevo Material';
    document.title = 'Nuevo Material';
    stockLabel.textContent = 'Se crea con stock inicial en 0.';
    saveBtnLabel.textContent = 'Crear Material';
    unitInput.value = 'kg';

    saveBtn.addEventListener('click', function () {
      if (!nombreInput.value.trim()) return showError('El nombre es requerido.');
      if (monedaSelect.value === 'PYG' && !tipoCambio) return showError('No hay un tipo de cambio cargado para convertir Guaraníes.');
      saveBtn.disabled = true;
      saveBtnLabel.textContent = 'Creando…';
      api.apiFetch('/materiales', {
        method: 'POST',
        body: JSON.stringify({
          nombre: nombreInput.value.trim(),
          descripcion: descripcionInput.value.trim(),
          unidad_medida: unitInput.value.trim() || 'kg',
          precio_compra: precioUsdActual(purchaseInput),
          precio_venta: precioUsdActual(saleInput),
          stock_minimo: parseFloat(stockMinimoInput.value) || 0,
          moneda: monedaSelect.value,
          tipo_cambio: monedaSelect.value === 'PYG' ? tipoCambio : null,
          precio_compra_original: parseFloat(purchaseInput.value) || 0,
          precio_venta_original: parseFloat(saleInput.value) || 0,
        }),
      }).then(function () {
        window.location.href = 'Inventario_Materiales.html';
      }).catch(function (err) {
        showError(err.message || 'No se pudo crear el material.');
        saveBtn.disabled = false;
        saveBtnLabel.textContent = 'Crear Material';
      });
    });
  }
})();
</script>
