<script>
(function () {
  var api = window.ReciclaAPI;
  var id = new URLSearchParams(window.location.search).get('id');
  var tableHead = document.getElementById('table-head');
  var tableBody = document.getElementById('table-body');
  var errorBox = document.getElementById('page-error');
  var tipoCambioPromise = api.apiFetch('/tipos-cambio/actual').then(function (data) {
    return Number(data.valor);
  }).catch(function () { return null; });
  var monedaPrincipalPromise = api.apiFetch('/configuracion').then(function (cfg) {
    return cfg.moneda_principal === 'PYG' ? 'PYG' : 'USD';
  }).catch(function () { return 'USD'; });

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.classList.remove('hidden');
  }

  var ESTADO_BADGE = {
    pendiente: 'bg-yellow-100 dark:bg-yellow-900/50 text-yellow-800 dark:text-yellow-300',
    confirmada: 'bg-green-100 dark:bg-green-900/50 text-green-800 dark:text-green-300',
    cancelada: 'bg-red-100 dark:bg-red-900/50 text-red-800 dark:text-red-300',
  };
  function badge(estado) {
    var cls = ESTADO_BADGE[estado] || 'bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300';
    return '<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ' + cls + '">' + api.escapeHtml(estado || '—') + '</span>';
  }

  if (id) {
    // Modo confirmación: una compra puntual (viene de Registro_nueva_compra.html)
    document.getElementById('page-title').textContent = 'Resumen de Compra';
    tableHead.innerHTML = '<tr class="bg-primary/10 dark:bg-primary/20">' +
      '<th class="px-4 py-3 text-slate-700 dark:text-slate-200 text-sm font-semibold leading-normal">Material</th>' +
      '<th class="px-4 py-3 text-slate-700 dark:text-slate-200 text-sm font-semibold leading-normal text-right">Peso (kg)</th>' +
      '<th class="px-4 py-3 text-slate-700 dark:text-slate-200 text-sm font-semibold leading-normal text-right">Desc. Suciedad (%)</th>' +
      '<th class="px-4 py-3 text-slate-700 dark:text-slate-200 text-sm font-semibold leading-normal text-right">Subtotal</th></tr>';

    Promise.all([tipoCambioPromise, api.apiFetch('/compras/' + id), monedaPrincipalPromise]).then(function (results) {
      var tipoCambio = results[0];
      var compra = results[1];
      var monedaPrincipal = results[2];
      document.getElementById('page-subtitle').textContent = 'Proveedor: ' + (compra.proveedor_nombre || '—') + ' · ' + api.fmtDateTime(compra.fecha);
      tableBody.innerHTML = compra.items.map(function (item) {
        var precioTxt = item.moneda === 'PYG'
          ? api.moneyGs(item.precio_original) + ' <span class="text-xs text-slate-500 dark:text-slate-400">(cambio ' + api.moneyGs(item.tipo_cambio) + ')</span>'
          : '';
        return '<tr>' +
          '<td class="px-4 py-3.5 text-slate-700 dark:text-slate-300 text-sm font-normal leading-normal">' + api.escapeHtml(item.material_nombre) + (precioTxt ? '<br/>' + precioTxt : '') + '</td>' +
          '<td class="px-4 py-3.5 text-slate-600 dark:text-slate-400 text-sm font-normal leading-normal text-right">' + item.peso_kg + '</td>' +
          '<td class="px-4 py-3.5 text-slate-600 dark:text-slate-400 text-sm font-normal leading-normal text-right">' + item.descuento_pct + '%</td>' +
          '<td class="px-4 py-3.5 text-slate-800 dark:text-slate-200 text-sm font-medium leading-normal text-right">' + api.moneyDual(item.subtotal, tipoCambio, monedaPrincipal) + '</td>' +
          '</tr>';
      }).join('');
      document.getElementById('total-row').classList.remove('hidden');
      document.getElementById('total-amount').innerHTML = api.moneyDual(compra.total, tipoCambio, monedaPrincipal);

      var confirmBtn = document.getElementById('confirm-btn');
      var cancelBtn = document.getElementById('cancel-btn');
      if (compra.estado === 'pendiente') {
        confirmBtn.classList.remove('hidden');
        confirmBtn.classList.add('flex');
        confirmBtn.addEventListener('click', function () {
          confirmBtn.disabled = true;
          cancelBtn.disabled = true;
          api.apiFetch('/compras/' + id + '/confirmar', { method: 'PATCH' }).then(function () {
            window.location.href = 'Reciclaje_tablero_principal.html';
          }).catch(function (err) {
            showError(err.message || 'No se pudo confirmar la compra.');
            confirmBtn.disabled = false;
            cancelBtn.disabled = false;
          });
        });
        cancelBtn.classList.remove('hidden');
        cancelBtn.classList.add('flex');
        cancelBtn.addEventListener('click', function () {
          if (!window.confirm('¿Cancelar esta compra? No se va a sumar al inventario.')) return;
          confirmBtn.disabled = true;
          cancelBtn.disabled = true;
          api.apiFetch('/compras/' + id + '/cancelar', { method: 'PATCH' }).then(function () {
            window.location.href = 'Reciclaje_tablero_principal.html';
          }).catch(function (err) {
            showError(err.message || 'No se pudo cancelar la compra.');
            confirmBtn.disabled = false;
            cancelBtn.disabled = false;
          });
        });
      } else {
        document.getElementById('page-subtitle').textContent += ' · ' + compra.estado;
      }
    }).catch(function (err) {
      showError(err.message || 'No se pudo cargar la compra.');
      tableBody.innerHTML = '';
    });
  } else {
    // Modo historial: todas las compras registradas
    tableHead.innerHTML = '<tr class="bg-primary/10 dark:bg-primary/20">' +
      '<th class="px-4 py-3 text-slate-700 dark:text-slate-200 text-sm font-semibold leading-normal">Fecha</th>' +
      '<th class="px-4 py-3 text-slate-700 dark:text-slate-200 text-sm font-semibold leading-normal">Proveedor</th>' +
      '<th class="px-4 py-3 text-slate-700 dark:text-slate-200 text-sm font-semibold leading-normal text-right">Total</th>' +
      '<th class="px-4 py-3 text-slate-700 dark:text-slate-200 text-sm font-semibold leading-normal text-center">Estado</th>' +
      '<th class="px-4 py-3 text-slate-700 dark:text-slate-200 text-sm font-semibold leading-normal text-center">Ver</th></tr>';

    api.apiFetch('/compras').then(function (compras) {
      if (compras.length === 0) {
        tableBody.innerHTML = '<tr><td class="px-4 py-3.5 text-slate-500 dark:text-slate-400" colspan="5">Todavía no hay compras registradas.</td></tr>';
        return;
      }
      tableBody.innerHTML = compras.map(function (c) {
        return '<tr>' +
          '<td class="px-4 py-3.5 text-slate-700 dark:text-slate-300 text-sm font-normal leading-normal">' + api.fmtDate(c.fecha) + '</td>' +
          '<td class="px-4 py-3.5 text-slate-700 dark:text-slate-300 text-sm font-normal leading-normal">' + api.escapeHtml(c.proveedor_nombre || '—') + '</td>' +
          '<td class="px-4 py-3.5 text-slate-800 dark:text-slate-200 text-sm font-medium leading-normal text-right">' + api.money(c.total) + '</td>' +
          '<td class="px-4 py-3.5 text-center">' + badge(c.estado) + '</td>' +
          '<td class="px-4 py-3.5 text-center"><a class="text-primary hover:underline text-sm font-medium" href="Resumen_Compras.html?id=' + c.id + '">Ver</a></td>' +
          '</tr>';
      }).join('');
    }).catch(function (err) {
      showError(err.message || 'No se pudo cargar el historial.');
      tableBody.innerHTML = '';
    });
  }
})();
</script>
